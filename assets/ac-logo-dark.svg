<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- Full-width black background with rounded corners -->
  <rect x="0" y="0" width="800" height="300" rx="12" ry="12" fill="#0a0a0a" />

  <defs>
    <linearGradient id="jet-improved-a-unique" x1="50%" y1="50%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color: #8CB5C8; stop-opacity: 1" />
      <stop offset="40%" style="stop-color: #7BA3B8; stop-opacity: 0.8" />
      <stop offset="70%" style="stop-color: #7BA3B8; stop-opacity: 0.3" />
      <stop offset="100%" style="stop-color: #7BA3B8; stop-opacity: 0" />
    </linearGradient>
    <linearGradient id="jet-improved-b-unique" x1="50%" y1="50%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color: #E8956F; stop-opacity: 1" />
      <stop offset="40%" style="stop-color: #D4745E; stop-opacity: 0.8" />
      <stop offset="70%" style="stop-color: #D4745E; stop-opacity: 0.3" />
      <stop offset="100%" style="stop-color: #D4745E; stop-opacity: 0" />
    </linearGradient>
    <radialGradient id="quasar-core-unique" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color: #F4C794; stop-opacity: 1" />
      <stop offset="50%" style="stop-color: #D4A574; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #C89B7C; stop-opacity: 1" />
    </radialGradient>
    <filter id="glow-quasar-unique">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strong-glow-unique">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(300, 50)">
    <!-- Enhanced quasar jets -->
    <polygon points="100,100 188,12 180,20 92,108" fill="url(#jet-improved-a-unique)" opacity="0.75" filter="url(#glow-quasar-unique)" />
    <polygon points="100,100 108,92 196,4 188,12" fill="url(#jet-improved-a-unique)" opacity="0.55" />
    <polygon points="100,100 193,7 191,9 98,102" fill="#8CB5C8" opacity="0.35" />

    <polygon points="100,100 12,188 20,180 108,92" fill="url(#jet-improved-b-unique)" opacity="0.75" filter="url(#glow-quasar-unique)" />
    <polygon points="100,100 92,108 4,196 12,188" fill="url(#jet-improved-b-unique)" opacity="0.55" />
    <polygon points="100,100 7,193 9,191 102,98" fill="#E8956F" opacity="0.35" />

    <!-- Enhanced accretion disk -->
    <ellipse cx="100" cy="100" rx="52" ry="17" fill="none" stroke="#9FB094" stroke-width="2.5" opacity="0.65" transform="rotate(45 100 100)" filter="url(#glow-quasar-unique)" />
    <ellipse cx="100" cy="100" rx="44" ry="14" fill="none" stroke="#8B9D83" stroke-width="2.2" opacity="0.75" transform="rotate(45 100 100)" />
    <ellipse cx="100" cy="100" rx="36" ry="11" fill="none" stroke="#C89B8C" stroke-width="2.8" opacity="0.85" transform="rotate(45 100 100)" />

    <!-- Quasar core -->
    <circle cx="100" cy="100" r="32" fill="url(#quasar-core-unique)" opacity="1" filter="url(#strong-glow-unique)" />
    <circle cx="100" cy="100" r="26" fill="#2C2C2C" opacity="0.95" />
    <circle cx="100" cy="100" r="20" fill="#1a1a1a" />

    <!-- AC text -->
    <text x="100" y="100" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" fill="#E8DCC4" text-anchor="middle" dominant-baseline="central" style="filter: drop-shadow(0 0 4px rgba(232, 220, 196, 0.6))">AC</text>

    <!-- Enhanced jet particles -->
    <circle cx="155" cy="45" r="2.8" fill="#8CB5C8" opacity="0.95" filter="url(#glow-quasar-unique)" />
    <circle cx="170" cy="30" r="2.2" fill="#E8DCC4" opacity="0.9" filter="url(#glow-quasar-unique)" />
    <circle cx="162" cy="38" r="1.6" fill="#7BA3B8" opacity="0.75" />
    <circle cx="145" cy="55" r="1.4" fill="#A5C5D8" opacity="0.65" />

    <circle cx="45" cy="155" r="2.8" fill="#E8956F" opacity="0.95" filter="url(#glow-quasar-unique)" />
    <circle cx="30" cy="170" r="2.2" fill="#E8DCC4" opacity="0.9" filter="url(#glow-quasar-unique)" />
    <circle cx="38" cy="162" r="1.6" fill="#D4745E" opacity="0.75" />
    <circle cx="55" cy="145" r="1.4" fill="#F4A57F" opacity="0.65" />

    <!-- Background ambient stars -->
    <circle cx="160" cy="90" r="1" fill="#E8DCC4" opacity="0.4" />
    <circle cx="90" cy="160" r="1" fill="#D4A574" opacity="0.4" />
    <circle cx="40" cy="40" r="1.2" fill="#7BA3B8" opacity="0.5" />
  </g>
</svg>
