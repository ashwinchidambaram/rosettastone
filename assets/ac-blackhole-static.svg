<svg xmlns="http://www.w3.org/2000/svg" viewBox="-250 -250 1000 1000">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>

    <clipPath id="back-clip">
      <rect x="-2000" y="-2000" width="4000" height="2000"/>
    </clipPath>
    <clipPath id="front-clip">
      <rect x="-2000" y="0" width="4000" height="2000"/>
    </clipPath>

    <radialGradient id="accretion-glow" cx="0" cy="0" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="55%" stop-color="#3D1B14" stop-opacity="0.7"/>
      <stop offset="75%" stop-color="#D4745E" stop-opacity="0.9"/>
      <stop offset="90%" stop-color="#EBB09F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="disk-gradient" x1="-300" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3D1B14"/>
      <stop offset="50%" stop-color="#EBB09F"/>
      <stop offset="100%" stop-color="#3D1B14"/>
    </linearGradient>

    <linearGradient id="jet-gradient-top" x1="0" y1="0" x2="0" y2="-300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EBB09F" stop-opacity="1"/>
      <stop offset="50%" stop-color="#EBB09F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#EBB09F" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="jet-gradient-bottom" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EBB09F" stop-opacity="1"/>
      <stop offset="50%" stop-color="#EBB09F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#EBB09F" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="jet-core-top" x1="0" y1="0" x2="0" y2="-300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="jet-core-bottom" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g>
    <g transform="translate(250, 250) rotate(-15)">
      <!-- Back Disk -->
      <g clip-path="url(#back-clip)">
        <g transform="scale(1, 0.25)">
          <circle r="210" fill="none" stroke="url(#disk-gradient)" stroke-width="80" opacity="0.3"/>
          <circle r="210" fill="none" stroke="url(#disk-gradient)" stroke-width="40" opacity="0.5"/>
          <g>
            <circle r="210" fill="none" stroke="#C4624D" stroke-width="20" opacity="0.9" stroke-dasharray="400 100"/>
            <circle r="160" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.8" stroke-dasharray="300 50"/>
          </g>
        </g>
      </g>

      <!-- Top Jet outer -->
      <polygon points="-20,0 20,0 40,-300 -40,-300" fill="url(#jet-gradient-top)" opacity="0.7"/>
      <!-- Top Jet inner -->
      <polygon points="-5,0 5,0 10,-300 -10,-300" fill="url(#jet-core-top)" opacity="0.8"/>
      <!-- Bottom Jet outer -->
      <polygon points="-20,0 20,0 40,300 -40,300" fill="url(#jet-gradient-bottom)" opacity="0.7"/>
      <!-- Bottom Jet inner -->
      <polygon points="-5,0 5,0 10,300 -10,300" fill="url(#jet-core-bottom)" opacity="0.8"/>

      <!-- Black Hole -->
      <circle r="160" fill="url(#accretion-glow)" opacity="0.45"/>
      <circle r="110" fill="none" stroke="#FCF0ED" stroke-width="12" opacity="0.3"/>
      <circle r="110" fill="none" stroke="#FCF0ED" stroke-width="4" opacity="0.6"/>
      <circle r="102" fill="none" stroke="#FCF0ED" stroke-width="2" opacity="0.9"/>
      <circle r="100" fill="#000000" stroke="#ffffff" stroke-width="1.5"/>
      <circle r="99" fill="#000000"/>

      <!-- Front Disk -->
      <g clip-path="url(#front-clip)">
        <g transform="scale(1, 0.25)">
          <circle r="210" fill="none" stroke="url(#disk-gradient)" stroke-width="80" opacity="0.3"/>
          <circle r="210" fill="none" stroke="url(#disk-gradient)" stroke-width="40" opacity="0.5"/>
          <g>
            <circle r="210" fill="none" stroke="#C4624D" stroke-width="20" opacity="0.9" stroke-dasharray="400 100"/>
            <circle r="160" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.8" stroke-dasharray="300 50"/>
          </g>
        </g>
      </g>
    </g>

    <!-- Text "AC" -->
    <g>
      <text x="250" y="250" dominant-baseline="central" font-family="Space Grotesk, system-ui, sans-serif" font-size="88" font-weight="700" fill="#D4745E" text-anchor="middle" opacity="0.5" stroke="#D4745E" stroke-width="8" letter-spacing="4px">AC</text>
      <text x="250" y="250" dominant-baseline="central" font-family="Space Grotesk, system-ui, sans-serif" font-size="88" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="4px">AC</text>
    </g>
  </g>
</svg>
