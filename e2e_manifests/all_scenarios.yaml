version: 1
defaults:
  gepa_auto: "light"
  reflection_model: "gemini/gemini-2.0-flash"
  judge_model: "gemini/gemini-2.0-flash"

migrations:
  # Category A: Cross-Provider (Anthropic <-> Gemini)
  - name: A1-haiku-to-gemini
    source_model: anthropic/claude-haiku-4-5-20251001
    target_model: gemini/gemini-2.0-flash
    data_path: ./e2e_output/haiku_data.jsonl

  - name: A2-gemini-to-haiku
    source_model: gemini/gemini-2.0-flash
    target_model: anthropic/claude-haiku-4-5-20251001
    data_path: ./e2e_output/gemini_data.jsonl

  - name: A3-gemini-to-sonnet
    source_model: gemini/gemini-2.0-flash
    target_model: anthropic/claude-sonnet-4
    data_path: ./e2e_output/gemini_data.jsonl

  # Category B: Model Upgrade (same provider)
  - name: B1-haiku-to-sonnet
    source_model: anthropic/claude-haiku-4-5-20251001
    target_model: anthropic/claude-sonnet-4
    data_path: ./e2e_output/haiku_data.jsonl

  - name: B2-flash-to-pro
    source_model: gemini/gemini-2.0-flash
    target_model: gemini/gemini-1.5-pro
    data_path: ./e2e_output/gemini_data.jsonl

  # Category C: Model Downgrade (same provider)
  - name: C1-sonnet-to-haiku
    source_model: anthropic/claude-sonnet-4
    target_model: anthropic/claude-haiku-4-5-20251001
    data_path: ./e2e_output/sonnet_data.jsonl

  - name: C2-pro-to-flash
    source_model: gemini/gemini-1.5-pro
    target_model: gemini/gemini-2.0-flash
    data_path: ./e2e_output/gemini_pro_data.jsonl
