name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev --all-extras
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev --all-extras
      - run: uv run mypy src/rosettastone/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev --all-extras
      - run: uv run pytest tests/ -v --ignore=tests/test_e2e

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rosettastone
          POSTGRES_PASSWORD: rosettastone
          POSTGRES_DB: rosettastone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev --all-extras
      - name: Run tests against PostgreSQL
        env:
          DATABASE_URL: postgresql+psycopg://rosettastone:rosettastone@localhost:5432/rosettastone_test
        run: uv run pytest tests/ -q --ignore=tests/test_e2e --ignore=tests/test_alembic.py

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev --all-extras
      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
      - name: Run Playwright UI tests
        run: uv run pytest tests/test_e2e/test_playwright_ui.py -v --tb=short

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Run Docker smoke test
        run: bash scripts/docker-smoke-test.sh
